name: Validate Instructions

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Author preflight
        run: python scripts/preflight-instructions.py --root .

      - name: Install smoke
        run: |
          mkdir -p .tmp/install-smoke
          python scripts/install-to-project.py --target .tmp/install-smoke
          python scripts/preflight-installed.py --root .tmp/install-smoke/.instructions
