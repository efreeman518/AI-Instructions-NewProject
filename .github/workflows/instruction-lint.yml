name: Instruction Lint

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/lint-instructions.ps1"
      - ".github/workflows/instruction-lint.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/lint-instructions.ps1"
      - ".github/workflows/instruction-lint.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-instructions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run instruction lint
        shell: pwsh
        run: ./scripts/lint-instructions.ps1