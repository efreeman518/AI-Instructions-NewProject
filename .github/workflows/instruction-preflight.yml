name: Instruction Preflight

on:
  pull_request:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/**"
      - "tests/**"
      - "phase-load-packs.json"
      - "_manifest.json"
      - ".github/workflows/instruction-preflight.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - "scripts/**"
      - "tests/**"
      - "phase-load-packs.json"
      - "_manifest.json"
      - ".github/workflows/instruction-preflight.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  instruction-preflight:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run instruction preflight
        run: python scripts/preflight-instructions.py

      - name: Run PowerShell instruction preflight
        shell: pwsh
        run: ./scripts/preflight-instructions.ps1 -Root .

      - name: Verify generated files are committed
        run: git diff --exit-code -- _manifest.json phase-load-packs.json
